<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Choudhry Dairy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4fff4;
}
.navbar {
    background: #2e7d32;
}
.card {
    border-radius: 15px;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}
.btn-green {
    background: #2e7d32;
    color: white;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
<h3 class="text-white">🌿 Choudhry Dairy</h3>
</div>
</nav>

<div class="container mt-4">

<h4>🛒 हमारे उत्पाद</h4>

<div class="row">

<!-- Milk -->
<div class="col-md-3">
<div class="card p-3 text-center">
<img src="/static/images/milk.jpg" class="img-fluid">
<h5>दूध</h5>
<p>₹60 / लीटर</p>
<button class="btn btn-green" onclick="addToCart('दूध',60)">Add</button>
</div>
</div>

<!-- Paneer -->
<div class="col-md-3">
<div class="card p-3 text-center">
<img src="/static/images/panner.jpg">
<h5>पनीर</h5>
<p>₹400 / KG</p>
<button class="btn btn-green" onclick="addToCart('पनीर',400)">Add</button>
</div>
</div>

<!-- Curd -->
<div class="col-md-3">
<div class="card p-3 text-center">
<img src="/static/images/yoghurt.jpg">
<h5>दही</h5>
<p>₹80 / KG</p>
<button class="btn btn-green" onclick="addToCart('दही',80)">Add</button>
</div>
</div>

</div>

<hr>

<h4>🧾 Cart</h4>
<ul id="cart"></ul>
<h5>Total: ₹<span id="total">0</span></h5>

<form method="POST" action="/checkout">
<input class="form-control mt-2" name="name" placeholder="नाम" required>
<input class="form-control mt-2" name="mobile" placeholder="मोबाइल" required>
<textarea class="form-control mt-2" name="address" placeholder="पता"></textarea>

<input type="hidden" name="cart_data" id="cart_data">

<button class="btn btn-success mt-3">Order Now</button>
</form>

</div>

<script>
let cart = [];
let total = 0;

function addToCart(product, price){
    cart.push({product, price});
    total += price;

    document.getElementById("cart").innerHTML += `<li>${product} - ₹${price}</li>`;
    document.getElementById("total").innerText = total;

    document.getElementById("cart_data").value = JSON.stringify(cart);
}
</script>

</body>
</html>
