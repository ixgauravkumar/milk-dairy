<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Choudhry Dairy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4fff4; }
.navbar { background: #2e7d32; }

.card {
    border-radius: 15px;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

.btn-green {
    background: #2e7d32;
    color: white;
}

.cart-box {
    background: #ffffff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
<div class="container d-flex justify-content-between">
    <h3 class="text-white">🌿 Choudhry Dairy</h3>

    <div class="text-white">
        👤 Welcome {{ name }} |
        <a href="/logout" class="text-white text-decoration-none">Logout</a>
    </div>
</div>
</nav>

<div class="container mt-4">

<h4>🛒 हमारे उत्पाद</h4>

<div class="row">

<!-- Milk -->
<div class="col-md-3">
<div class="card p-3 text-center">
<img src="/static/images/milk.jpg" class="img-fluid">
<h5>दूध</h5>
<p>₹60 / लीटर</p>
<button class="btn btn-green" onclick="addToCart('Milk')">Add</button>
</div>
</div>

<!-- Paneer -->
<div class="col-md-3">
<div class="card p-3 text-center">
<img src="/static/images/panner.jpg" class="img-fluid">
<h5>पनीर</h5>
<p>₹400 / KG</p>
<button class="btn btn-green" onclick="addToCart('Cheese')">Add</button>
</div>
</div>

<!-- Curd -->
<div class="col-md-3">
<div class="card p-3 text-center">
<img src="/static/images/yoghurt.jpg" class="img-fluid">
<h5>दही</h5>
<p>₹80 / KG</p>
<button class="btn btn-green" onclick="addToCart('Curd')">Add</button>
</div>
</div>

</div>

<hr>

<!-- CART -->
<div class="cart-box mt-3">

<h4>🧾 Cart</h4>

<ul id="cart-list" class="list-group mb-3"></ul>

<h5>Total: ₹<span id="total">0</span></h5>

<form method="POST" action="/checkout">

<input class="form-control mt-2" name="name" placeholder="नाम" required>
<input class="form-control mt-2" name="mobile" placeholder="मोबाइल" required>
<textarea class="form-control mt-2" name="address" placeholder="पता"></textarea>

<!-- IMPORTANT -->
<input type="hidden" name="cart_data" id="cart_data">

<button class="btn btn-success mt-3 w-100">Order Now</button>

</form>

</div>

</div>

<script src="/static/js/script.js"></script>

</body>
</html>
