<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Register - Choudhry Dairy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #e8f5e9, #ffffff);
}

.register-box {
    max-width: 450px;
    margin: 50px auto;
    padding: 25px;
    background: white;
    border-radius: 15px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.1);
}

.btn-green {
    background: #2e7d32;
    color: white;
}

.title {
    color: #2e7d32;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="register-box text-center">

<h3 class="title">🌿 Choudhry Dairy</h3>
<p>Create your account</p>

<form method="POST">

<input name="first_name" class="form-control mb-2" placeholder="First Name" required>

<input name="last_name" class="form-control mb-2" placeholder="Last Name" required>

<input name="mobile" class="form-control mb-2" placeholder="📱 Mobile Number" required>

<input name="password" type="password" class="form-control mb-2" placeholder="🔒 Password" required>

<textarea name="location" class="form-control mb-3" placeholder="📍 Address / Location"></textarea>

<button class="btn btn-green w-100">Register</button>

</form>

<p class="mt-3">
Already have account? <a href="/login">Login</a>
</p>

</div>

</body>
</html>
