<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4fff4">

<div class="container mt-4">

<h2>📊 Choudhry Dairy Dashboard</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card p-3 bg-success text-white">
<h4>Total Orders</h4>
<h2>{{orders|length}}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 bg-primary text-white">
<h4>Total Revenue</h4>
<h2>₹{{total}}</h2>
</div>
</div>

</div>

<hr>

<h4>📦 Order List</h4>

<table class="table table-bordered">
<tr>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Cart</th>
<th>Total</th>
<th>Action</th>
</tr>

{% for o in orders %}
<tr>
<td>{{o[0]}}</td>
<td>{{o[1]}}</td>
<td>{{o[2]}}</td>
<td>{{o[4]}}</td>
<td>₹{{o[5]}}</td>
<td>
<a href="/invoice/{{o[0]}}" class="btn btn-success btn-sm">Invoice</a>
</td>
</tr>
{% endfor %}

</table>

</div>
</body>
</html>
